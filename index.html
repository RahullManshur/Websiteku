<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setor Akun Gmail</title>

<style>
:root{
--bg:#020617;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
--primary:#6366f1;
--text:#e2e8f0;
--success:#22c55e;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617);
color:var(--text);
}

.container{
max-width:520px;
margin:40px auto;
padding:30px;
background:var(--glass);
backdrop-filter:blur(18px);
border:1px solid var(--border);
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:fadeUp .7s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px)}
to{opacity:1}
}

h1{text-align:center;}

.sub{
text-align:center;
font-size:13px;
opacity:.7;
margin-bottom:20px;
}

.trust{
display:flex;
gap:8px;
margin-bottom:20px;
}
.trust div{
flex:1;
text-align:center;
padding:10px;
background:var(--glass);
border-radius:10px;
border:1px solid var(--border);
font-size:13px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid var(--border);
background:transparent;
color:white;
}

input:focus,textarea:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 10px var(--primary);
}

#total{
text-align:center;
color:var(--success);
font-weight:bold;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,var(--primary),#4f46e5);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 5px 20px rgba(99,102,241,0.5);
}

#msg{
text-align:center;
margin-top:10px;
font-size:13px;
color:var(--success);
}

.footer{
margin-top:20px;
font-size:12px;
opacity:.6;
text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h1>SETOR AKUN GMAIL</h1>
<div class="sub">Proses cepat • Pembayaran 1–24 jam</div>

<div class="trust">
<div>✔ Aman</div>
<div>⚡ Cepat</div>
<div>💰 Dibayar</div>
</div>

<form action="https://formspree.io/f/mreyvjll" method="POST" id="form">

<textarea name="email" placeholder="email:password" required></textarea>

<input type="number" id="jumlah" name="jumlah" placeholder="Jumlah akun" required>

<div id="total"></div>

<input type="text" name="wa" placeholder="Nomor WhatsApp" required>
<input type="text" name="dana" placeholder="Nomor DANA" required>

<input type="hidden" name="_subject" value="Setoran Gmail Masuk">

<button type="submit">Kirim Sekarang</button>

<p id="msg"></p>

</form>

<div class="footer">
Pastikan data benar sebelum mengirim
</div>
</div>

<script>
const harga=1500;
const jumlah=document.getElementById('jumlah');
const total=document.getElementById('total');

jumlah.addEventListener('input',()=>{
total.innerText="Total: Rp "+(jumlah.value*harga);
});

/* NOTIF TEXT */
document.getElementById("form").addEventListener("submit",function(){
document.getElementById("msg").innerText="Sedang mengirim...";

/* TELEGRAM NOTIF */
const email=document.querySelector('textarea[name="email"]').value;
const jml=document.getElementById('jumlah').value;
const wa=document.querySelector('input[name="wa"]').value;
const dana=document.querySelector('input[name="dana"]').value;

const text=`🔥 SETOR MASUK 🔥

📧 ${email}

📦 Jumlah: ${jml}
📱 WA: ${wa}
💰 DANA: ${dana}`;

fetch("https://api.telegram.org/bot8657907532:AAFmZLlol8V-nKu1zehXHM6KakBcc3xT-7s/sendMessage?chat_id=5943311408&text="+encodeURIComponent(text));

});
</script>

</body>
</html>
