<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setor Akun Gmail - Job Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        textarea,
        input[type="text"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
        .info-box {
            background-color: #e7f3fe;
            border-left: 6px solid #2196F3;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 4px;
            color: #2196F3;
            font-size: 14px;
        }
        .info-box ul {
            margin-top: 10px;
            padding-left: 20px;
        }
        .info-box li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Setor Akun Gmail</h1>
        <div class="info-box">
            <p><strong>Penting!</strong> Mohon perhatikan panduan berikut saat menyetor akun:</p>
            <ul>
                <li>Satu email per baris.</li>
                <li>Hanya akun Google Mail (Gmail).</li>
                <li>Pastikan email dan password benar.</li>
                <li>Nomor WhatsApp Anda harus aktif agar kami bisa memverifikasi dan memproses pembayaran.</li>
            </ul>
        </div>
        <form id="gmailAccountForm">
            <label for="email_list">Daftar Akun Gmail:</label>
            <textarea id="email_list" name="email_list" placeholder="Contoh:&#10;user1@gmail.com:password123&#10;user2@gmail.com:password456" rows="8" required></textarea>

            <label for="jumlah_akun">Jumlah Akun yang Disetor:</label>
            <input type="text" id="jumlah_akun" name="jumlah_akun" placeholder="Contoh: 5" required>

            <label for="whatsapp_number_user">Nomor WhatsApp Anda:</label>
            <input type="text" id="whatsapp_number_user" name="whatsapp_number_user" placeholder="Contoh: 6281234567890 (tanpa +)" required>

            <label for="dana_number">Nomor DANA untuk Pembayaran:</label>
            <input type="text" id="dana_number" name="dana_number" placeholder="Contoh: 081234567890 (untuk pembayaran)" required>

            <button type="submit" id="sendButton">Setor Akun Gmail</button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
    const form = document.getElementById('gmailAccountForm');
    const sendButton = document.getElementById('sendButton');
    const messageDiv = document.getElementById('message');

    // NOMOR WHATSAPP KAMU (NOMOR ADMIN) SUDAH TERISI DI SINI
    const adminWhatsAppNumber = "6288229814051"; // Nomor WhatsApp kamu: 088229814051, diubah ke format internasional tanpa +

    form.addEventListener('submit', function (e) {
        e.preventDefault(); // Menghentikan pengiriman form default
        
        sendButton.disabled = true;
        sendButton.textContent = 'Mengarahkan ke WhatsApp...';
        messageDiv.textContent = ''; // Kosongkan pesan sebelumnya

        const emailList = document.getElementById('email_list').value;
        const jumlahAkun = document.getElementById('jumlah_akun').value;
        const userWhatsAppNumber = document.getElementById('whatsapp_number_user').value;
        const danaNumber = document.getElementById('dana_number').value;

        // Membuat pesan WhatsApp
        const waMessage = `Halo Admin, saya ingin menyetor akun Gmail:\n\n` +
                          `Daftar Akun:\n${emailList}\n\n` +
                          `Jumlah Akun: ${jumlahAkun}\n` +
                          `Nomor WhatsApp User: ${userWhatsAppNumber}\n` +
                          `Nomor DANA Pembayaran: ${danaNumber}\n\n` +
                          `Mohon diproses, terima kasih.`;

        // Mengkodekan pesan agar aman di URL
        const encodedMessage = encodeURIComponent(waMessage);

        // Membuat URL WhatsApp
        const whatsappURL = `https://wa.me/${adminWhatsAppNumber}?text=${encodedMessage}`;

        // Mengarahkan user ke WhatsApp
        window.open(whatsappURL, '_blank');

        messageDiv.textContent = 'Formulir berhasil dikirim! Silakan lanjutkan di WhatsApp.';
        messageDiv.style.color = 'green';
        form.reset(); // Mengosongkan form setelah berhasil
        
        sendButton.disabled = false;
        sendButton.textContent = 'Setor Akun Gmail';
    });
    </script>
</body>
</html>
