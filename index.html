<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setor Gmail</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
padding:25px;
background:#1e293b;
border-radius:15px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

#msg{
text-align:center;
margin-top:10px;
color:#22c55e;
}
</style>
</head>

<body>

<div class="box">
<h1>SETOR GMAIL</h1>

<form id="form">

<textarea id="akun" placeholder="email:password" required></textarea>
<input type="number" id="jumlah" placeholder="Jumlah akun" required>
<input type="text" id="wa" placeholder="No WhatsApp" required>
<input type="text" id="dana" placeholder="No DANA" required>

<button type="submit">Kirim</button>
<p id="msg"></p>

</form>
</div>

<script>
const form=document.getElementById("form");

form.addEventListener("submit",async(e)=>{
e.preventDefault();

document.getElementById("msg").innerText="Mengirim...";

const akun=document.getElementById("akun").value;
const jumlah=document.getElementById("jumlah").value;
const wa=document.getElementById("wa").value;
const dana=document.getElementById("dana").value;

const text=`SETOR BARU

${akun}

Jumlah: ${jumlah}
WA: ${wa}
DANA: ${dana}`;

try{

/* 1. KIRIM TELEGRAM */
await fetch("https://api.telegram.org/bot8657907532:AAFmZLlol8V-nKu1zehXHM6KakBcc3xT-7s/sendMessage?chat_id=5943311408&text="+encodeURIComponent(text));

/* 2. KIRIM KE FORMSPREE */
await fetch("https://formspree.io/f/mreyvjll",{
method:"POST",
headers:{
'Accept':'application/json'
},
body:new FormData(form)
});

document.getElementById("msg").innerText="Berhasil dikirim!";
form.reset();

}catch(err){
document.getElementById("msg").innerText="Gagal kirim!";
}

});
</script>

</body>
</html>
